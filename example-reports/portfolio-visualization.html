<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Agentic Readiness — Visual Dashboard</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232733;--border:#2e3345;--text:#e1e4ed;--dim:#8b90a0;--accent:#6c8cff;--green:#34d399;--yellow:#fbbf24;--orange:#fb923c;--red:#f87171;--purple:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.header{padding:24px 40px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;font-weight:600}.header .meta{font-size:13px;color:var(--dim)}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 40px;background:var(--surface)}
.tab{padding:12px 20px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--dim);transition:all .2s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:32px 40px}.panel{display:none}.panel.active{display:block}
.score-hero{display:flex;align-items:center;gap:40px;margin-bottom:32px}
.score-ring{position:relative;width:160px;height:160px;flex-shrink:0}
.score-ring svg{transform:rotate(-90deg)}
.score-ring .value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-ring .value .num{font-size:36px;font-weight:700}.score-ring .value .label{font-size:12px;color:var(--dim)}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:32px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px}
.kpi .kv{font-size:28px;font-weight:700;margin-bottom:4px}.kpi .kl{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.cat-bars{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.cat-bar{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px}
.cat-bar .cn{font-size:13px;margin-bottom:8px;display:flex;justify-content:space-between}
.cat-bar .bt{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.cat-bar .bf{height:100%;border-radius:4px;transition:width .6s ease}
.services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-bottom:32px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.sc:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.sc .sh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px}
.sc .sn{font-size:16px;font-weight:600}.sc .ss{font-size:24px;font-weight:700}
.sc .st{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.sc .st span{font-size:11px;padding:3px 8px;border-radius:4px;background:var(--surface2);color:var(--dim)}
.scr{display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:6px}
.scr .cl{width:110px;color:var(--dim);flex-shrink:0}.scr .mb{flex:1;height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.scr .mf{height:100%;border-radius:3px}.scr .cs{width:40px;text-align:right;font-weight:600;font-size:11px}
.badge{position:absolute;top:0;right:0;padding:6px 12px;font-size:11px;font-weight:600;border-radius:0 12px 0 8px}
.dep-wrap{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:12px;min-height:520px;overflow:hidden}
.dep-canvas{position:relative;width:100%;height:520px}
.dn{position:absolute;background:var(--surface2);border:2px solid var(--border);border-radius:12px;padding:16px;width:190px;text-align:center;cursor:pointer;transition:all .2s;z-index:2}
.dn:hover{border-color:var(--accent);z-index:3}
.dn .nn{font-size:13px;font-weight:600;margin-bottom:4px}.dn .ns{font-size:20px;font-weight:700}
.dn .nt{font-size:11px;color:var(--dim);margin-top:4px}
.dn .np{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block;margin-top:6px}
.dep-svg{position:absolute;inset:0;z-index:1;pointer-events:none}
.heatmap{overflow-x:auto;margin-bottom:32px}
.heatmap table{border-collapse:collapse;width:100%;min-width:700px}
.heatmap th,.heatmap td{padding:10px 14px;text-align:center;font-size:13px;border:1px solid var(--border)}
.heatmap th{background:var(--surface);color:var(--dim);font-weight:500}
.heatmap td:first-child{text-align:left;font-weight:500;background:var(--surface)}
.cell{border-radius:4px;padding:6px 10px;font-weight:600;font-size:12px;display:inline-block;min-width:50px}
.roadmap{position:relative;padding-left:32px}
.roadmap::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:var(--border)}
.phase{margin-bottom:32px;position:relative}
.phase-dot{position:absolute;left:-32px;top:4px;width:22px;height:22px;border-radius:50%;border:3px solid;background:var(--bg);z-index:1}
.phase h3{font-size:16px;font-weight:600;margin-bottom:4px}
.phase .pt{font-size:12px;color:var(--dim);margin-bottom:12px}
.phase-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.pi{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:13px;line-height:1.5}
.pi .ps{font-size:11px;color:var(--accent);margin-bottom:2px}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;justify-content:center;align-items:flex-start;padding:60px 20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;max-width:800px;width:100%;padding:32px;position:relative}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer}
.modal h2{font-size:20px;margin-bottom:8px}
.modal .ms{font-size:14px;color:var(--dim);margin-bottom:20px}
.dc{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.dc .dcn{width:200px;font-size:13px}.dc .dcb{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden}
.dc .dcf{height:100%;border-radius:5px}.dc .dcs{width:60px;text-align:right;font-weight:600;font-size:13px}
.ds{margin-top:20px}.ds h4{font-size:14px;margin-bottom:8px;color:var(--accent)}
.ds ul{list-style:none;padding:0}.ds li{font-size:13px;padding:6px 0;border-bottom:1px solid var(--border);color:var(--dim);line-height:1.5}
.ds li::before{content:'→ ';color:var(--accent)}
.legend{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--dim)}
.legend-dot{width:12px;height:12px;border-radius:3px}
@media(max-width:768px){.content{padding:20px}.cat-bars{grid-template-columns:1fr}.services-grid{grid-template-columns:1fr}.score-hero{flex-direction:column;text-align:center}}
</style>
</head>
<body>
<div class="header">
  <div><h1>🔍 Portfolio Agentic Readiness Assessment</h1><div class="meta">agentic-readiness-assessment · 5 Services · 2026-03-05</div></div>
  <div style="text-align:right"><div style="font-size:12px;color:var(--dim)">Estimated Effort</div><div style="font-size:18px;font-weight:700">30 person-months · 9 months</div></div>
</div>
<div class="tabs">
  <div class="tab active" data-tab="dashboard">Executive Dashboard</div>
  <div class="tab" data-tab="services">Service Cards</div>
  <div class="tab" data-tab="depmap">Dependency Map</div>
  <div class="tab" data-tab="heatmap">Readiness Heatmap</div>
  <div class="tab" data-tab="roadmap">Modernization Roadmap</div>
</div>
<div class="content" id="app"></div>
<div class="modal-overlay" id="modal"><div class="modal" id="modal-body"><button class="modal-close" onclick="closeModal()">✕</button><div id="modal-content"></div></div></div>
<script>
const SERVICES = [
  { id:'books-api', name:'books-api', score:2.0, status:'🟠', priority:'P1', lang:'TypeScript', compute:'Lambda (Node.js 22.x)', db:'DynamoDB', arch:'Serverless Modular',
    cats:{inf:2.6,app:1.7,data:1.9,sec:1.9,ops:1.7},
    tech:['TypeScript','Lambda','DynamoDB','Cognito','SAM','CDK','CodePipeline'],
    strengths:['Full CI/CD with 4 stages','100% IaC (SAM+CDK)','Cognito authentication','Canary deployments'],
    gaps:['No OpenAPI spec','No structured logging','No vector DB / RAG','No idempotency','No async messaging']
  },
  { id:'aws-microservices', name:'aws-microservices', score:1.8, status:'🟠', priority:'P0', lang:'JavaScript/TypeScript', compute:'Lambda (Node.js 14.x ⚠️ EOL)', db:'DynamoDB ×3', arch:'Microservices',
    cats:{inf:2.5,app:1.8,data:2.1,sec:1.4,ops:1.0},
    tech:['JavaScript','CDK','Lambda','DynamoDB','EventBridge','SQS','API Gateway'],
    strengths:['True microservices (3 services)','Full IaC via CDK','EventBridge + SQS async','DynamoDB per service'],
    gaps:['Zero authentication','No CI/CD','No observability','EOL Node.js 14','No API docs','Stack traces in errors']
  },
  { id:'payment-service', name:'payment-service', score:1.6, status:'🟠', priority:'P1', lang:'JavaScript (Node.js 18.x)', compute:'Lambda', db:'RDS PostgreSQL', arch:'Serverless',
    cats:{inf:1.8,app:1.7,data:1.7,sec:1.6,ops:1.2},
    tech:['Node.js','Lambda','RDS PostgreSQL','Stripe','Serverless Framework'],
    strengths:['Serverless compute','Managed RDS','Clear domain boundary','Joi validation'],
    gaps:['No source code','No IaC (serverless.yml missing)','No CI/CD','Synchronous only','No observability','No API docs']
  },
  { id:'notification-service', name:'notification-service', score:1.3, status:'❌', priority:'P2', lang:'Python 3.11', compute:'Lambda (planned)', db:'DynamoDB (planned)', arch:'Event-Driven (planned)',
    cats:{inf:1.0,app:1.6,data:1.8,sec:1.0,ops:1.2},
    tech:['Python','Lambda Powertools','Pydantic','Jinja2','EventBridge','SQS','SES/SNS'],
    strengths:['Well-designed architecture','Python (best agent ecosystem)','Lambda Powertools planned','Event-driven design'],
    gaps:['No source code','No IaC','No CI/CD','No security controls','No observability','README-only']
  },
  { id:'MonoToMicroLegacy', name:'MonoToMicroLegacy', score:1.3, status:'❌', priority:'P2', lang:'Java 8 ⚠️ EOL', compute:'EC2 (Spring Boot JAR)', db:'MySQL (self-managed)', arch:'Monolith',
    cats:{inf:1.0,app:1.38,data:2.0,sec:1.1,ops:1.0},
    tech:['Java 8','Spring Boot 2.1.6','MySQL','MyBatis','EC2'],
    strengths:['Clean module boundaries','Interface-based services','No stored procedures','Single data source'],
    gaps:['Hardcoded DB credentials','No IaC','No CI/CD','No containers','All endpoints unauthenticated','No observability','Java 8 EOL']
  }
];

const CATEGORIES = [
  {key:'inf',name:'Infrastructure & Platform',score:1.78},
  {key:'app',name:'Application Architecture',score:1.64},
  {key:'data',name:'Data Foundations',score:1.90},
  {key:'sec',name:'Identity, Security & Governance',score:1.40},
  {key:'ops',name:'Operations & Observability',score:1.22}
];

const DEPS = [
  {from:'aws-microservices',to:'notification-service',type:'async',label:'order events'},
  {from:'aws-microservices',to:'payment-service',type:'sync',label:'order context'},
  {from:'payment-service',to:'notification-service',type:'async',label:'payment events'},
  {from:'MonoToMicroLegacy',to:'notification-service',type:'async',label:'user events'},
  {from:'books-api',to:'notification-service',type:'async',label:'book events (planned)'}
];

function scoreColor(s){if(s>=3.5)return'var(--green)';if(s>=2.5)return'var(--yellow)';if(s>=1.5)return'var(--orange)';return'var(--red)'}
function statusLabel(s){if(s>=3.5)return'Agent-Ready';if(s>=2.5)return'Partial';if(s>=1.5)return'Needs Work';return'Not Ready'}
function pct(s){return(s/4*100).toFixed(0)}

function renderDashboard(){
  const r=62,circ=2*Math.PI*r,offset=circ-(1.6/4)*circ;
  return `<div class="panel active" id="p-dashboard">
    <div class="score-hero">
      <div class="score-ring">
        <svg width="160" height="160"><circle cx="80" cy="80" r="${r}" fill="none" stroke="var(--surface2)" stroke-width="12"/>
        <circle cx="80" cy="80" r="${r}" fill="none" stroke="${scoreColor(1.6)}" stroke-width="12" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/></svg>
        <div class="value"><span class="num" style="color:${scoreColor(1.6)}">1.60</span><span class="label">/ 4.0</span></div>
      </div>
      <div>
        <p style="font-size:15px;font-weight:600;margin-bottom:8px;color:var(--orange)">⚠ Not Ready for Agentic Workloads</p>
        <p>This portfolio of 5 services scores 1.60/4.0 — firmly in "Needs Work." No service achieves even "Partial" readiness. The weakest dimension is Operations & Observability (1.22) — every service lacks structured logging, SLOs, and anomaly detection. Identity & Security (1.40) is second weakest — 4/5 services have no API authentication.</p>
      </div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kv" style="color:var(--orange)">0 / 5</div><div class="kl">Services Agent-Ready</div></div>
      <div class="kpi"><div class="kv">5</div><div class="kl">Total Services</div></div>
      <div class="kpi"><div class="kv" style="color:var(--red)">10+</div><div class="kl">Shared Infra Gaps</div></div>
      <div class="kpi"><div class="kv">4</div><div class="kl">Critical Dependencies</div></div>
      <div class="kpi"><div class="kv">30</div><div class="kl">Person-Months Est.</div></div>
      <div class="kpi"><div class="kv">9 mo</div><div class="kl">Timeline (4 phases)</div></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Agent-Ready (3.5-4.0)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>Partial (2.5-3.4)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div>Needs Work (1.5-2.4)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Not Ready (&lt;1.5)</div>
    </div>
    <div class="cat-bars">${CATEGORIES.map(c=>`<div class="cat-bar"><div class="cn"><span>${c.name}</span><span style="color:${scoreColor(c.score)}">${c.score.toFixed(2)} / 4.0</span></div><div class="bt"><div class="bf" style="width:${pct(c.score)}%;background:${scoreColor(c.score)}"></div></div></div>`).join('')}
    </div>
    <h3 style="margin-bottom:16px;font-size:15px">Readiness Distribution</h3>
    <div class="services-grid">${SERVICES.map(s=>`<div class="sc" onclick="openModal('${s.id}')">
      <div class="badge" style="background:${scoreColor(s.score)}20;color:${scoreColor(s.score)}">${statusLabel(s.score)}</div>
      <div class="sh"><div class="sn">${s.name}</div><div class="ss" style="color:${scoreColor(s.score)}">${s.score.toFixed(1)}</div></div>
      <div class="st">${s.tech.slice(0,4).map(t=>`<span>${t}</span>`).join('')}</div>
      ${CATEGORIES.map(c=>`<div class="scr"><span class="cl">${c.name.split(' ')[0]}</span><div class="mb"><div class="mf" style="width:${pct(s.cats[c.key])}%;background:${scoreColor(s.cats[c.key])}"></div></div><span class="cs" style="color:${scoreColor(s.cats[c.key])}">${s.cats[c.key].toFixed(1)}</span></div>`).join('')}
    </div>`).join('')}</div>
  </div>`;
}

function renderServices(){
  return `<div class="panel" id="p-services">
    <h3 style="margin-bottom:20px;font-size:15px">All Services — Click for Details</h3>
    <div class="services-grid">${SERVICES.map(s=>`<div class="sc" onclick="openModal('${s.id}')">
      <div class="badge" style="background:${scoreColor(s.score)}20;color:${scoreColor(s.score)}">${s.priority}</div>
      <div class="sh"><div class="sn">${s.name}</div><div class="ss" style="color:${scoreColor(s.score)}">${s.score.toFixed(1)}</div></div>
      <div style="font-size:12px;color:var(--dim);margin-bottom:8px">${s.arch} · ${s.lang}</div>
      <div class="st">${s.tech.map(t=>`<span>${t}</span>`).join('')}</div>
      ${CATEGORIES.map(c=>`<div class="scr"><span class="cl">${c.name.split('&')[0].trim()}</span><div class="mb"><div class="mf" style="width:${pct(s.cats[c.key])}%;background:${scoreColor(s.cats[c.key])}"></div></div><span class="cs" style="color:${scoreColor(s.cats[c.key])}">${s.cats[c.key].toFixed(1)}</span></div>`).join('')}
    </div>`).join('')}</div>
  </div>`;
}

function renderDepMap(){
  const positions = {
    'aws-microservices':{x:50,y:60},
    'books-api':{x:50,y:340},
    'payment-service':{x:380,y:60},
    'MonoToMicroLegacy':{x:380,y:340},
    'notification-service':{x:700,y:200}
  };
  let nodes = SERVICES.map(s=>{
    const p=positions[s.id];
    return `<div class="dn" style="left:${p.x}px;top:${p.y}px" onclick="openModal('${s.id}')">
      <div class="nn">${s.name}</div><div class="ns" style="color:${scoreColor(s.score)}">${s.score.toFixed(1)}</div>
      <div class="nt">${s.arch}</div>
      <div class="np" style="background:${s.priority==='P0'?'var(--red)':s.priority==='P1'?'var(--orange)':'var(--yellow)'}20;color:${s.priority==='P0'?'var(--red)':s.priority==='P1'?'var(--orange)':'var(--yellow)'}">${s.priority}</div>
    </div>`;
  }).join('');

  let lines = DEPS.map(d=>{
    const f=positions[d.from], t=positions[d.to];
    const x1=f.x+95,y1=f.y+40,x2=t.x+95,y2=t.y+40;
    const col=d.type==='sync'?'var(--accent)':'var(--purple)';
    const dash=d.type==='async'?'stroke-dasharray="6 4"':'';
    const mx=(x1+x2)/2,my=(y1+y2)/2;
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="2" ${dash}/>
      <text x="${mx}" y="${my-8}" fill="var(--dim)" font-size="10" text-anchor="middle">${d.label}</text>`;
  }).join('');

  return `<div class="panel" id="p-depmap">
    <div class="legend" style="margin-bottom:16px">
      <div class="legend-item"><div style="width:24px;height:2px;background:var(--accent)"></div>Synchronous</div>
      <div class="legend-item"><div style="width:24px;height:2px;background:var(--purple);border-top:2px dashed var(--purple)"></div>Asynchronous</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--red)20;border:1px solid var(--red)"></div>P0 Critical</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--orange)20;border:1px solid var(--orange)"></div>P1 Important</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)20;border:1px solid var(--yellow)"></div>P2 Deferred</div>
    </div>
    <div class="dep-wrap"><div class="dep-canvas">
      <svg class="dep-svg" width="100%" height="100%">${lines}</svg>
      ${nodes}
    </div></div>
    <div style="margin-top:20px;font-size:13px;color:var(--dim);line-height:1.7">
      <p><strong style="color:var(--text)">Critical Path:</strong> aws-microservices (P0) → payment-service (P1) → notification-service (P2). books-api (P1) is isolated and can be modernized in parallel. MonoToMicroLegacy (P2) requires extensive foundational work.</p>
    </div>
  </div>`;
}

function renderHeatmap(){
  const questions = [
    {cat:'INF',items:[{q:'Compute',k:'inf1'},{q:'Databases',k:'inf2'},{q:'Workflow Orch.',k:'inf3'},{q:'Async Messaging',k:'inf4'},{q:'IaC',k:'inf5'},{q:'CI/CD',k:'inf6'},{q:'API Entry',k:'inf7'}]},
    {cat:'APP',items:[{q:'Languages',k:'app1'},{q:'API Docs',k:'app2'},{q:'Async/Sync',k:'app3'},{q:'Architecture',k:'app4'},{q:'Response Format',k:'app5'},{q:'Idempotency',k:'app7'}]},
    {cat:'SEC',items:[{q:'Secret Mgmt',k:'sec1'},{q:'Authentication',k:'sec9'},{q:'Audit Logging',k:'sec4'},{q:'Human Approval',k:'sec7'}]},
    {cat:'OPS',items:[{q:'Dist. Tracing',k:'ops1'},{q:'Struct. Logging',k:'ops2'},{q:'SLO Definitions',k:'ops4'},{q:'Anomaly Detect.',k:'ops8'}]}
  ];
  const scores = {
    'books-api':      {inf1:4,inf2:4,inf3:1,inf4:1,inf5:4,inf6:4,inf7:3,app1:3,app2:1,app3:1,app4:3,app5:4,app7:1,sec1:2,sec9:3,sec4:2,sec7:1,ops1:2,ops2:1,ops4:1,ops8:1},
    'aws-microservices':{inf1:4,inf2:4,inf3:1,inf4:4,inf5:4,inf6:1,inf7:2,app1:3,app2:1,app3:2,app4:4,app5:4,app7:1,sec1:2,sec9:1,sec4:1,sec7:1,ops1:1,ops2:1,ops4:1,ops8:1},
    'payment-service': {inf1:4,inf2:3,inf3:1,inf4:1,inf5:1,inf6:1,inf7:2,app1:3,app2:1,app3:1,app4:3,app5:3,app7:2,sec1:2,sec9:2,sec4:1,sec7:1,ops1:2,ops2:1,ops4:1,ops8:1},
    'notification-service':{inf1:1,inf2:1,inf3:1,inf4:1,inf5:1,inf6:1,inf7:1,app1:3,app2:1,app3:2,app4:2,app5:2,app7:2,sec1:1,sec9:1,sec4:1,sec7:1,ops1:1,ops2:1,ops4:1,ops8:1},
    'MonoToMicroLegacy':{inf1:1,inf2:1,inf3:1,inf4:1,inf5:1,inf6:1,inf7:1,app1:2,app2:1,app3:1,app4:2,app5:3,app7:2,sec1:1,sec9:1,sec4:1,sec7:1,ops1:1,ops2:1,ops4:1,ops8:1}
  };
  let rows='';
  questions.forEach(cat=>{
    cat.items.forEach((item,i)=>{
      rows+=`<tr><td>${i===0?'<strong style="color:var(--accent)">'+cat.cat+'</strong> ':''}${item.q}</td>`;
      SERVICES.forEach(s=>{
        const v=scores[s.id][item.k]||1;
        rows+=`<td><span class="cell" style="background:${scoreColor(v)}20;color:${scoreColor(v)}">${v}/4</span></td>`;
      });
      rows+='</tr>';
    });
  });
  return `<div class="panel" id="p-heatmap">
    <h3 style="margin-bottom:16px;font-size:15px">Cross-Service Readiness Heatmap</h3>
    <div class="heatmap"><table>
      <thead><tr><th style="text-align:left">Criterion</th>${SERVICES.map(s=>`<th>${s.name}</th>`).join('')}</tr></thead>
      <tbody>${rows}</tbody>
    </table></div>
    <div style="margin-top:12px">
      <div class="legend">
        <div class="legend-item"><span class="cell" style="background:var(--green)20;color:var(--green)">4/4</span> Agent-Ready</div>
        <div class="legend-item"><span class="cell" style="background:var(--yellow)20;color:var(--yellow)">3/4</span> Good</div>
        <div class="legend-item"><span class="cell" style="background:var(--orange)20;color:var(--orange)">2/4</span> Partial</div>
        <div class="legend-item"><span class="cell" style="background:var(--red)20;color:var(--red)">1/4</span> Missing</div>
      </div>
    </div>
  </div>`;
}

function renderRoadmap(){
  const phases=[
    {name:'Phase 0 — Foundation',time:'Months 0–1 · 6 person-months',color:'var(--purple)',items:[
      {svc:'Shared',text:'Deploy centralized Cognito User Pool for e-commerce platform'},
      {svc:'Shared',text:'Extend EventBridge as portfolio-wide event backbone'},
      {svc:'Shared',text:'Create CI/CD pipeline templates (Node.js, Python, Java)'},
      {svc:'Shared',text:'Establish OpenAPI 3.0 standards and validation tooling'},
      {svc:'Shared',text:'Enable CloudTrail with log file validation across all accounts'},
      {svc:'Shared',text:'Create reusable IaC modules (SAM/CDK) for common patterns'}
    ]},
    {name:'Phase 1 — Core Services',time:'Months 1–3 · 5 person-months',color:'var(--accent)',items:[
      {svc:'books-api',text:'Generate OpenAPI spec, add Lambda Powertools, implement idempotency'},
      {svc:'books-api',text:'Add EventBridge integration, API versioning, tighten CI/CD IAM'},
      {svc:'aws-microservices',text:'Upgrade Node.js 14→20, add Cognito auth to all APIs'},
      {svc:'aws-microservices',text:'Create CI/CD pipeline, enable X-Ray, structured logging'},
      {svc:'aws-microservices',text:'Generate OpenAPI specs for Product, Basket, Order APIs'},
      {svc:'aws-microservices',text:'Remove stack traces from errors, add CloudWatch alarms'}
    ]},
    {name:'Phase 2 — Dependent Services',time:'Months 3–6 · 10 person-months',color:'var(--orange)',items:[
      {svc:'payment-service',text:'Create serverless.yml, implement source code, OpenAPI spec'},
      {svc:'payment-service',text:'Integrate Cognito, async SQS processing, VPC + RDS security'},
      {svc:'payment-service',text:'Add Secrets Manager, RDS Multi-AZ, distributed tracing'},
      {svc:'notification-service',text:'Create SAM template, implement Python Lambda handler'},
      {svc:'notification-service',text:'Connect to portfolio EventBridge, implement security controls'},
      {svc:'notification-service',text:'Add observability (Powertools Logger/Tracer), CI/CD pipeline'}
    ]},
    {name:'Phase 3 — Optimization & Agent Enablement',time:'Months 6–9 · 9 person-months',color:'var(--green)',items:[
      {svc:'MonoToMicroLegacy',text:'Containerize Spring Boot, create IaC, set up CI/CD'},
      {svc:'MonoToMicroLegacy',text:'Extract User service (Strangler Fig), add API Gateway + auth'},
      {svc:'All Services',text:'Deploy vector database (Bedrock Knowledge Bases / OpenSearch)'},
      {svc:'All Services',text:'Implement RAG pipelines per domain'},
      {svc:'All Services',text:'Add Strands Agents SDK / Bedrock agent tools per service'},
      {svc:'All Services',text:'Human approval workflows (Step Functions waitForTaskToken)'}
    ]}
  ];
  return `<div class="panel" id="p-roadmap">
    <h3 style="margin-bottom:20px;font-size:15px">4-Phase Modernization Roadmap</h3>
    <div class="roadmap">${phases.map(p=>`<div class="phase">
      <div class="phase-dot" style="border-color:${p.color}"></div>
      <h3 style="color:${p.color}">${p.name}</h3><div class="pt">${p.time}</div>
      <div class="phase-items">${p.items.map(i=>`<div class="pi"><div class="ps">${i.svc}</div>${i.text}</div>`).join('')}</div>
    </div>`).join('')}</div>
  </div>`;
}

function render(){
  document.getElementById('app').innerHTML = renderDashboard()+renderServices()+renderDepMap()+renderHeatmap()+renderRoadmap();
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('p-'+t.dataset.tab).classList.add('active');
  });
});

function openModal(id){
  const s=SERVICES.find(x=>x.id===id);if(!s)return;
  let html=`<h2>${s.name}</h2><div class="ms">${s.score.toFixed(1)} / 4.0 — ${statusLabel(s.score)} · ${s.arch} · ${s.priority}</div>`;
  html+=CATEGORIES.map(c=>`<div class="dc"><span class="dcn">${c.name}</span><div class="dcb"><div class="dcf" style="width:${pct(s.cats[c.key])}%;background:${scoreColor(s.cats[c.key])}"></div></div><span class="dcs" style="color:${scoreColor(s.cats[c.key])}">${s.cats[c.key].toFixed(1)}/4</span></div>`).join('');
  html+=`<div class="ds"><h4>✅ Strengths</h4><ul>${s.strengths.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  html+=`<div class="ds"><h4>❌ Critical Gaps</h4><ul>${s.gaps.map(x=>`<li>${x}</li>`).join('')}</ul></div>`;
  html+=`<div class="ds"><h4>🏷 Technology Stack</h4><div class="st" style="margin-top:8px">${s.tech.map(t=>`<span style="font-size:12px;padding:4px 10px;border-radius:4px;background:var(--surface2);color:var(--dim)">${t}</span>`).join('')}</div></div>`;
  const deps=DEPS.filter(d=>d.from===id||d.to===id);
  if(deps.length){
    html+=`<div class="ds"><h4>🔗 Dependencies</h4><ul>${deps.map(d=>{
      const dir=d.from===id?`→ ${d.to}`:`← ${d.from}`;
      return `<li>${dir} (${d.type}: ${d.label})</li>`;
    }).join('')}</ul></div>`;
  }
  document.getElementById('modal-content').innerHTML=html;
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open')}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

render();
</script>
</body>
</html>
