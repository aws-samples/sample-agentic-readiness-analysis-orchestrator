<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARA — Online Boutique Agentic Readiness Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--card:#222639;--border:#2d3148;--text:#e2e4ed;--muted:#8b8fa3;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--yellow:#eab308;--orange:#f97316;--red:#ef4444;--green-bg:rgba(34,197,94,.12);--yellow-bg:rgba(234,179,8,.12);--orange-bg:rgba(249,115,22,.12);--red-bg:rgba(239,68,68,.12)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
a{color:var(--accent2);text-decoration:none}a:hover{text-decoration:underline;color:#a5b4fc}
.container{max-width:1440px;margin:0 auto;padding:24px}
nav{display:flex;align-items:center;gap:6px;margin-bottom:24px;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--border)}
nav a{padding:8px 18px;font-size:.82rem;font-weight:600;color:var(--muted);border-radius:8px;border:1px solid var(--border);background:var(--surface);transition:all .2s;white-space:nowrap;text-decoration:none}
nav a:hover{border-color:var(--accent);color:var(--text)}nav a.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:12px}
.top-bar h1{font-size:1.35rem;font-weight:700;letter-spacing:-.02em}.top-bar h1 span{color:var(--accent2)}
.grid{display:grid;gap:20px}.grid-4{grid-template-columns:repeat(4,1fr)}.grid-3{grid-template-columns:repeat(3,1fr)}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-12{grid-template-columns:repeat(12,1fr)}
.span-8{grid-column:span 8}.span-4{grid-column:span 4}.span-6{grid-column:span 6}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:border-color .2s}.card:hover{border-color:var(--accent)}
.card-title{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-value{font-size:2rem;font-weight:700;letter-spacing:-.03em}
.card-sub{font-size:.8rem;color:var(--muted);margin-top:4px}
.score-green{color:var(--green)}.score-yellow{color:var(--yellow)}.score-orange{color:var(--orange)}.score-red{color:var(--red)}
.bg-green{background:var(--green-bg)}.bg-yellow{background:var(--yellow-bg)}.bg-orange{background:var(--orange-bg)}.bg-red{background:var(--red-bg)}
.score-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin-top:8px}.score-bar-fill{height:100%;border-radius:3px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
.pill-green{background:var(--green-bg);color:var(--green)}.pill-yellow{background:var(--yellow-bg);color:var(--yellow)}.pill-orange{background:var(--orange-bg);color:var(--orange)}.pill-red{background:var(--red-bg);color:var(--red)}.pill-blue{background:rgba(99,102,241,.12);color:var(--accent2)}.pill-muted{background:rgba(139,143,163,.12);color:var(--muted)}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{text-align:left;padding:10px 12px;font-weight:600;color:var(--muted);border-bottom:1px solid var(--border);font-size:.75rem;text-transform:uppercase;letter-spacing:.04em}
td{padding:10px 12px;border-bottom:1px solid var(--border)}tr:hover td{background:rgba(99,102,241,.04)}
.section{margin-bottom:32px}.section-title{font-size:1.1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.tab-bar{display:flex;gap:4px;margin:0 0 24px;background:var(--surface);border-radius:10px;padding:4px;width:fit-content}
.tab-btn{padding:8px 24px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all .15s}
.tab-btn.active{background:var(--accent);color:#fff}.tab-btn:hover:not(.active){color:var(--text)}
.tab-pane{display:none}.tab-pane.active{display:block}
.delta-pos{color:var(--green)}.delta-neg{color:var(--red)}.delta-zero{color:var(--muted)}
@media(max-width:1024px){.grid-4{grid-template-columns:repeat(2,1fr)}.grid-12 .span-8,.grid-12 .span-4,.grid-12 .span-6{grid-column:span 12}.grid-3{grid-template-columns:1fr}}
@media(max-width:640px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<div class="top-bar">
  <h1>🛡️ <span>Agentic Readiness</span> — Online Boutique</h1>
  <div style="font-size:.8rem;color:var(--muted)">📅 April 16, 2026 · online-boutique · agent_scope: read-only</div>
</div>
<nav>
  <a href="agentic-readiness.html" class="active">🛡️ Agentic Readiness (ARA)</a>
  <a href="modernization.html">📐 Modernization (MOD)</a>
</nav>
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('before')">Before Remediation</button>
  <button class="tab-btn" onclick="switchTab('after')">After Remediation</button>
</div>
<div id="pane-before" class="tab-pane active"></div>
<div id="pane-after" class="tab-pane"></div>
<!-- Delta Section -->
<div class="section" id="delta-section">
  <div class="section-title"><span>📊</span> Remediation Delta — Before vs After</div>
  <div class="grid grid-2">
    <div class="card"><div class="card-title">Key Metrics Delta</div><div id="delta-metrics"></div></div>
    <div class="card"><div class="card-title">BLOCKER Reduction per Service</div><div style="position:relative;height:260px"><canvas id="deltaChart"></canvas></div></div>
  </div>
  <div class="card" style="margin-top:20px"><div class="card-title">Service-by-Service Comparison</div><div class="table-wrap"><table id="delta-table"></table></div></div>
</div>
</div>
<script>
const BEFORE={agentReady:0,pilotReady:0,remReq:10,notInt:1,blockers:19,risks:181,infos:143,ccBlockers:2,ccBlockerDesc:'AUTH-Q1 (11), DATA-Q1 (7)',ccRisks:32,
services:[
{id:'frontend',arch:'orchestrator',scope:'read-only',profile:'Not Integrable',pc:'pill-red',b:3,r:18,i:11,pri:'P0',prc:'pill-red'},
{id:'cartservice',arch:'stateful-crud',scope:'read-only',profile:'Remediation Req.',pc:'pill-orange',b:2,r:27,i:10,pri:'P0',prc:'pill-red'},
{id:'checkoutservice',arch:'orchestrator',scope:'read-only',profile:'Remediation Req.',pc:'pill-orange',b:2,r:25,i:11,pri:'P0',prc:'pill-red'},
{id:'paymentservice',arch:'stateful-crud',scope:'read-only',profile:'Remediation Req.',pc:'pill-orange',b:2,r:18,i:12,pri:'P0',prc:'pill-red'},
{id:'productcatalogservice',arch:'stateless-utility',scope:'read-only',profile:'Remediation Req.',pc:'pill-orange',b:1,r:12,i:18,pri:'P0',prc:'pill-red'},
{id:'shippingservice',arch:'stateful-crud',scope:'read-only',profile:'Remediation Req.',pc:'pill-orange',b:2,r:17,i:13,pri:'P1',prc:'pill-orange'},
{id:'recommendationservice',arch:'data-gateway',scope:'read-only',profile:'Remediation Req.',pc:'pill-orange',b:2,r:17,i:13,pri:'P1',prc:'pill-orange'},
{id:'currencyservice',arch:'stateless-utility',scope:'read-only',profile:'Remediation Req.',pc:'pill-orange',b:1,r:16,i:14,pri:'P1',prc:'pill-orange'},
{id:'emailservice',arch:'event-processor',scope:'read-only',profile:'Remediation Req.',pc:'pill-orange',b:2,r:10,i:19,pri:'P2',prc:'pill-yellow'},
{id:'adservice',arch:'stateless-utility',scope:'read-only',profile:'Remediation Req.',pc:'pill-orange',b:1,r:12,i:18,pri:'P2',prc:'pill-yellow'},
{id:'platform-infra',arch:'infrastructure-only',scope:'read-only',profile:'Remediation Req.',pc:'pill-orange',b:1,r:9,i:4,pri:'—',prc:'pill-muted'}],
heatmap:[{sec:'AUTH',b:11,r:11},{sec:'DATA',b:7,r:10},{sec:'API',b:1,r:10},{sec:'STATE',b:0,r:10},{sec:'ENG',b:0,r:11},{sec:'OBS',b:0,r:11},{sec:'DISC',b:0,r:10},{sec:'HITL',b:0,r:10}],
snapshot:'assessment_date: 2026-04-16\ntotal_services: 11\nagent_ready: 0\npilot_ready: 0\nremediation_required: 10\nnot_integrable: 1\ntotal_blockers: 19\ntotal_risks: 181\ntotal_infos: 143\ncross_cutting_blockers: 2\ncross_cutting_risks: 32'};

const AFTER={agentReady:0,pilotReady:10,remReq:1,notInt:0,blockers:1,risks:119,infos:236,ccBlockers:0,ccBlockerDesc:'None',ccRisks:8,
services:[
{id:'frontend',arch:'orchestrator',scope:'read-only',profile:'Remediation Req.',pc:'pill-orange',b:1,r:16,i:23,pri:'P0',prc:'pill-red'},
{id:'cartservice',arch:'stateful-crud',scope:'read-only',profile:'Pilot-Ready',pc:'pill-yellow',b:0,r:13,i:26,pri:'P0',prc:'pill-red'},
{id:'checkoutservice',arch:'orchestrator',scope:'read-only',profile:'Pilot-Ready',pc:'pill-yellow',b:0,r:17,i:20,pri:'P0',prc:'pill-red'},
{id:'paymentservice',arch:'stateful-crud',scope:'read-only',profile:'Pilot-Ready',pc:'pill-yellow',b:0,r:14,i:25,pri:'P0',prc:'pill-red'},
{id:'productcatalogservice',arch:'stateless-utility',scope:'read-only',profile:'Pilot-Ready',pc:'pill-yellow',b:0,r:5,i:27,pri:'P0',prc:'pill-red'},
{id:'shippingservice',arch:'stateful-crud',scope:'read-only',profile:'Pilot-Ready',pc:'pill-yellow',b:0,r:13,i:20,pri:'P1',prc:'pill-orange'},
{id:'recommendationservice',arch:'data-gateway',scope:'read-only',profile:'Pilot-Ready',pc:'pill-yellow',b:0,r:11,i:25,pri:'P1',prc:'pill-orange'},
{id:'currencyservice',arch:'stateless-utility',scope:'read-only',profile:'Pilot-Ready',pc:'pill-yellow',b:0,r:12,i:19,pri:'P1',prc:'pill-orange'},
{id:'emailservice',arch:'event-processor',scope:'read-only',profile:'Pilot-Ready',pc:'pill-yellow',b:0,r:7,i:24,pri:'P2',prc:'pill-yellow'},
{id:'adservice',arch:'stateless-utility',scope:'read-only',profile:'Pilot-Ready',pc:'pill-yellow',b:0,r:5,i:26,pri:'P2',prc:'pill-yellow'},
{id:'platform-infra',arch:'infrastructure-only',scope:'read-only',profile:'Pilot-Ready',pc:'pill-yellow',b:0,r:6,i:8,pri:'—',prc:'pill-muted'}],
heatmap:[{sec:'AUTH',b:0,r:6},{sec:'DATA',b:0,r:8},{sec:'API',b:1,r:8},{sec:'STATE',b:0,r:8},{sec:'ENG',b:0,r:10},{sec:'OBS',b:0,r:9},{sec:'DISC',b:0,r:7},{sec:'HITL',b:0,r:8}],
snapshot:'assessment_date: 2026-04-16\ntotal_services: 11\nagent_ready: 0\npilot_ready: 10\nremediation_required: 1\nnot_integrable: 0\ntotal_blockers: 1\ntotal_risks: 119\ntotal_infos: 236\ncross_cutting_blockers: 0\ncross_cutting_risks: 8'};

const charts={};
function renderPane(d,pid){
  const el=document.getElementById(pid);
  el.innerHTML=`
  <div class="section"><div class="grid grid-4">
    <div class="card"><div class="card-title">🛡️ Agent-Ready</div><div class="card-value ${d.agentReady+d.pilotReady>0?'score-green':'score-red'}">${d.agentReady+d.pilotReady}<span style="font-size:1rem;color:var(--muted)"> / 11</span></div><div class="card-sub">${Math.round((d.agentReady+d.pilotReady)/11*100)}% Agent-Ready or Pilot-Ready</div></div>
    <div class="card"><div class="card-title">🚨 Cross-Cutting BLOCKERs</div><div class="card-value ${d.ccBlockers>0?'score-red':'score-green'}">${d.ccBlockers}</div><div class="card-sub">${d.ccBlockerDesc}</div></div>
    <div class="card"><div class="card-title">⚠️ Cross-Cutting RISKs</div><div class="card-value score-orange">${d.ccRisks}</div><div class="card-sub">Same risk in 3+ repos</div></div>
    <div class="card"><div class="card-title">📋 Total BLOCKERs</div><div class="card-value ${d.blockers>0?'score-yellow':'score-green'}">${d.blockers}</div><div class="card-sub">Sum across all 11 services</div></div>
  </div></div>
  <div class="section"><div class="section-title"><span>📈</span> Readiness Profile Distribution</div><div class="grid grid-4">
    <div class="card bg-green" style="text-align:center"><div style="font-size:2.5rem;font-weight:700;color:var(--green)">${d.agentReady}</div><div style="font-size:.82rem;color:var(--green)">✅ Agent-Ready</div></div>
    <div class="card bg-yellow" style="text-align:center"><div style="font-size:2.5rem;font-weight:700;color:var(--yellow)">${d.pilotReady}</div><div style="font-size:.82rem;color:var(--yellow)">🟡 Pilot-Ready</div></div>
    <div class="card bg-orange" style="text-align:center"><div style="font-size:2.5rem;font-weight:700;color:var(--orange)">${d.remReq}</div><div style="font-size:.82rem;color:var(--orange)">🟠 Remediation Req.</div></div>
    <div class="card bg-red" style="text-align:center"><div style="font-size:2.5rem;font-weight:700;color:var(--red)">${d.notInt}</div><div style="font-size:.82rem;color:var(--red)">❌ Not Integrable</div></div>
  </div></div>
  <div class="section"><div class="grid grid-12">
    <div class="card span-4"><div class="card-title">🎯 Profile Distribution</div><div style="position:relative;height:260px"><canvas id="${pid}-prof"></canvas></div></div>
    <div class="card span-4"><div class="card-title">📊 Severity by Service</div><div style="position:relative;height:260px"><canvas id="${pid}-sev"></canvas></div></div>
    <div class="card span-4"><div class="card-title">🔥 Section Heatmap</div><div style="position:relative;height:260px"><canvas id="${pid}-heat"></canvas></div></div>
  </div></div>
  <div class="section"><div class="section-title"><span>🔍</span> Service-by-Service Summary</div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Service</th><th>Archetype</th><th>Scope</th><th>Profile</th><th>BLOCKERs</th><th>RISKs</th><th>INFOs</th><th>Priority</th></tr></thead>
    <tbody>${d.services.map(s=>`<tr><td style="font-weight:600">${s.id}</td><td>${s.arch}</td><td>${s.scope}</td><td><span class="pill ${s.pc}">${s.profile}</span></td><td class="${s.b>=3?'score-red':s.b>=1?'score-orange':''}">${s.b}</td><td class="${s.r>=20?'score-orange':s.r>=10?'score-yellow':''}">${s.r}</td><td>${s.i}</td><td><span class="pill ${s.prc}">${s.pri}</span></td></tr>`).join('')}</tbody>
  </table></div></div></div>
  <div class="section"><div class="section-title"><span>🔗</span> Dependency Map</div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Service</th><th>Fan-In</th><th>Fan-Out</th><th>Role</th><th>Profile</th></tr></thead>
    <tbody>
      <tr><td style="font-weight:600">platform-infra</td><td>11</td><td>0</td><td>Foundation</td><td><span class="pill ${d.services[10].pc}">${d.services[10].profile}</span></td></tr>
      <tr><td style="font-weight:600">productcatalogservice</td><td>3</td><td>0</td><td>Foundation</td><td><span class="pill ${d.services[4].pc}">${d.services[4].profile}</span></td></tr>
      <tr><td style="font-weight:600">currencyservice</td><td>2</td><td>0</td><td>Foundation</td><td><span class="pill ${d.services[7].pc}">${d.services[7].profile}</span></td></tr>
      <tr><td style="font-weight:600">checkoutservice</td><td>1</td><td>6</td><td>Orchestrator</td><td><span class="pill ${d.services[2].pc}">${d.services[2].profile}</span></td></tr>
      <tr><td style="font-weight:600">frontend</td><td>0</td><td>7</td><td>Entry Point</td><td><span class="pill ${d.services[0].pc}">${d.services[0].profile}</span></td></tr>
    </tbody>
  </table></div></div></div>
  <div class="section"><div class="section-title"><span>📋</span> Readiness Snapshot</div>
  <div class="card" style="font-family:'SF Mono',Consolas,monospace;font-size:.78rem;color:#a5b4fc;background:#181b24;line-height:1.8;padding:16px;white-space:pre">${d.snapshot}</div></div>`;
  [pid+'-prof',pid+'-sev',pid+'-heat'].forEach(k=>{if(charts[k]){charts[k].destroy();delete charts[k];}});
  charts[pid+'-prof']=new Chart(document.getElementById(pid+'-prof'),{type:'doughnut',data:{labels:['Agent-Ready','Pilot-Ready','Remediation Req.','Not Integrable'],datasets:[{data:[d.agentReady,d.pilotReady,d.remReq,d.notInt],backgroundColor:['#22c55e','#eab308','#f97316','#ef4444'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8b8fa3',font:{size:10},padding:10}}}}});
  charts[pid+'-sev']=new Chart(document.getElementById(pid+'-sev'),{type:'bar',data:{labels:d.services.map(s=>s.id.replace('service','')),datasets:[{label:'BLOCKERs',data:d.services.map(s=>s.b),backgroundColor:'#ef4444'},{label:'RISKs',data:d.services.map(s=>s.r),backgroundColor:'#f97316'},{label:'INFOs',data:d.services.map(s=>s.i),backgroundColor:'#6366f1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa3',font:{size:10}}}},scales:{x:{stacked:true,ticks:{color:'#8b8fa3',font:{size:7},maxRotation:45},grid:{display:false}},y:{stacked:true,ticks:{color:'#8b8fa3'},grid:{color:'#2d3148'}}}}});
  charts[pid+'-heat']=new Chart(document.getElementById(pid+'-heat'),{type:'bar',data:{labels:d.heatmap.map(h=>h.sec),datasets:[{label:'BLOCKERs',data:d.heatmap.map(h=>h.b),backgroundColor:'#ef4444'},{label:'RISKs',data:d.heatmap.map(h=>h.r),backgroundColor:'#f97316'}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa3',font:{size:10}}}},scales:{x:{stacked:true,min:0,max:12,ticks:{color:'#8b8fa3'},grid:{color:'#2d3148'}},y:{stacked:true,ticks:{color:'#8b8fa3',font:{size:11}},grid:{display:false}}}}});
}
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(t==='before'?0:1)));
  document.getElementById('pane-before').classList.toggle('active',t==='before');
  document.getElementById('pane-after').classList.toggle('active',t==='after');
  renderPane(t==='before'?BEFORE:AFTER,t==='before'?'pane-before':'pane-after');
}
function renderDelta(){
  const metrics=[{l:'Total BLOCKERs',a:BEFORE.blockers,b:AFTER.blockers},{l:'Total RISKs',a:BEFORE.risks,b:AFTER.risks},{l:'Pilot-Ready',a:BEFORE.pilotReady,b:AFTER.pilotReady},{l:'Cross-Cutting BLOCKERs',a:BEFORE.ccBlockers,b:AFTER.ccBlockers},{l:'Not Integrable',a:BEFORE.notInt,b:AFTER.notInt}];
  document.getElementById('delta-metrics').innerHTML='<table>'+metrics.map(m=>{const d=m.b-m.a;const c=d<0?'delta-pos':d>0?'delta-neg':'delta-zero';return`<tr><td style="font-weight:600">${m.l}</td><td>${m.a}</td><td>→</td><td>${m.b}</td><td class="${c}" style="font-weight:700">${d>0?'+':''}${d}</td></tr>`;}).join('')+'</table>';
  document.getElementById('delta-table').innerHTML=`<thead><tr><th>Service</th><th>B Before</th><th>B After</th><th>Δ B</th><th>R Before</th><th>R After</th><th>Δ R</th><th>Profile Change</th></tr></thead><tbody>`+BEFORE.services.map((bs,i)=>{const as=AFTER.services[i];const db=as.b-bs.b,dr=as.r-bs.r;const pc=bs.profile===as.profile?`<span class="pill pill-muted">${as.profile}</span>`:`<span class="pill ${bs.pc}">${bs.profile}</span> → <span class="pill ${as.pc}">${as.profile}</span>`;return`<tr><td style="font-weight:600">${bs.id}</td><td>${bs.b}</td><td>${as.b}</td><td class="${db<0?'delta-pos':'delta-zero'}" style="font-weight:700">${db<0?'':'+'}${db}</td><td>${bs.r}</td><td>${as.r}</td><td class="${dr<0?'delta-pos':'delta-zero'}" style="font-weight:700">${dr<0?'':'+'}${dr}</td><td>${pc}</td></tr>`;}).join('')+'</tbody>';
  new Chart(document.getElementById('deltaChart'),{type:'bar',data:{labels:BEFORE.services.map(s=>s.id.replace('service','')),datasets:[{label:'Before',data:BEFORE.services.map(s=>s.b),backgroundColor:'rgba(239,68,68,.4)',borderColor:'#ef4444',borderWidth:1},{label:'After',data:AFTER.services.map(s=>s.b),backgroundColor:'rgba(34,197,94,.4)',borderColor:'#22c55e',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa3',font:{size:10}}}},scales:{x:{ticks:{color:'#8b8fa3',font:{size:7},maxRotation:45},grid:{display:false}},y:{ticks:{color:'#8b8fa3'},grid:{color:'#2d3148'}}}}});
}
renderPane(BEFORE,'pane-before');renderDelta();
</script>
</body>
</html>
