# Online Boutique — Google Cloud Microservices Demo
# https://github.com/GoogleCloudPlatform/microservices-demo
# 11 services, polyglot (Go, Python, Java, C#, Node.js, Rust)
# gRPC + protobuf, OpenTelemetry, Kubernetes, Terraform, CI/CD

portfolio_name: "online-boutique"
assessment_type: "agentic-readiness"
context: "Cloud-native e-commerce platform with 11 microservices. Evaluating for autonomous AI agent integration (customer support agent for order tracking, product recommendations, and cart management)."
agent_scope: "read-only"

transformation_definitions:
  agentic_readiness: "agentic-readiness-assessment"
  modernization: "modernization-assessment"
  portfolio_agentic_readiness: "portfolio-agentic-readiness"
  portfolio_modernization: "portfolio-modernization"

preferences:
  prefer: ["eks", "dynamodb", "bedrock", "terraform", "gitops"]
  avoid: ["serverless", "manual-deployments"]

repositories:
  - name: "frontend"
    repository_url: "https://github.com/GoogleCloudPlatform/microservices-demo.git"
    path: "./services/microservices-demo/src/frontend"
    priority: "P0"
    context: "Go web frontend serving the Online Boutique UI. Calls all backend services via gRPC."
    tags: ["go", "frontend", "grpc"]

  - name: "cartservice"
    path: "./services/microservices-demo/src/cartservice"
    priority: "P0"
    context: "C# gRPC service managing shopping carts with Redis backing store."
    tags: ["csharp", "grpc", "redis", "stateful"]

  - name: "productcatalogservice"
    path: "./services/microservices-demo/src/productcatalogservice"
    priority: "P0"
    context: "Go gRPC service serving product catalog from a JSON file."
    tags: ["go", "grpc", "catalog"]

  - name: "checkoutservice"
    path: "./services/microservices-demo/src/checkoutservice"
    priority: "P0"
    context: "Go gRPC service orchestrating the checkout workflow — calls cart, product, shipping, currency, payment, and email services."
    tags: ["go", "grpc", "orchestrator", "critical-path"]

  - name: "paymentservice"
    path: "./services/microservices-demo/src/paymentservice"
    priority: "P0"
    context: "Node.js gRPC service handling payment processing (simulated)."
    tags: ["nodejs", "grpc", "payment"]

  - name: "currencyservice"
    path: "./services/microservices-demo/src/currencyservice"
    priority: "P1"
    context: "C++ gRPC service converting between currencies."
    tags: ["cpp", "grpc", "utility"]

  - name: "shippingservice"
    path: "./services/microservices-demo/src/shippingservice"
    priority: "P1"
    context: "Go gRPC service providing shipping cost estimates and tracking."
    tags: ["go", "grpc", "shipping"]

  - name: "emailservice"
    path: "./services/microservices-demo/src/emailservice"
    priority: "P2"
    context: "Python gRPC service sending order confirmation emails."
    tags: ["python", "grpc", "notifications"]

  - name: "recommendationservice"
    path: "./services/microservices-demo/src/recommendationservice"
    priority: "P1"
    context: "Python gRPC service providing product recommendations based on cart contents."
    tags: ["python", "grpc", "ml", "recommendations"]

  - name: "adservice"
    path: "./services/microservices-demo/src/adservice"
    priority: "P2"
    context: "Java gRPC service serving contextual ads based on product categories."
    tags: ["java", "grpc", "ads"]

  - name: "platform-infra"
    path: "./services/microservices-demo"
    context: "Root-level deployment and infrastructure configuration — Kubernetes manifests, Helm charts, Kustomize overlays, Terraform IaC, Istio service mesh configs, Skaffold/Cloud Build CI/CD pipelines, and shared protobuf definitions."
    tags: ["kubernetes", "helm", "terraform", "istio", "cicd", "iac"]
