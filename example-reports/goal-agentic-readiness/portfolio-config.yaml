portfolio_name: "agentic-readiness-baseline"
goal: "agentic-readiness"

transformation_definitions:
  individual_assessment: "agentic-readiness-assessment"
  portfolio_assessment: "portfolio-agentic-readiness-assessment"

repositories:
  - name: "unishop-monolith"
    path: "./services/unishop-monolith-to-microservices/MonoToMicroLegacy"
    priority: "P0"
    repository_url: "https://github.com/aws-samples/unishop-monolith-to-microservices.git"
    context: "Legacy Java monolith e-commerce application"

  - name: "aws-microservices"
    path: "./services/aws-microservices"
    priority: "P0"
    repository_url: "https://github.com/awsrun/aws-microservices.git"
    tags: ["microservices", "serverless", "event-driven"]
    context: "Event-driven serverless microservices with Lambda, DynamoDB, EventBridge, SQS"

  - name: "local-monolith"
    path: "./monolith"
    priority: "P0"
    tags: ["monolith", "php", "containers"]
    context: "PHP monolith application with Docker and CloudFormation"

  - name: "books-api"
    path: "./services/books-api"
    priority: "P1"
    repository_url: "https://github.com/aws-samples/aws-serverless-books-api-sample.git"
    tags: ["serverless", "cdk", "api"]
    context: "Serverless REST API with CDK infrastructure for book catalog management"

  - name: "eks-saas-gitops"
    path: "./services/eks-saas-gitops"
    priority: "P1"
    repository_url: "https://github.com/aws-solutions-library-samples/eks-saas-gitops"
    tags: ["eks", "gitops", "terraform", "saas"]
    context: "EKS SaaS GitOps monorepo with Terraform IaC, Karpenter, and multi-tenant microservices"

dependency_overrides:
  - source: "aws-microservices"
    target: "books-api"
    type: "async"
    description: "Microservices ordering flow triggers book catalog updates via EventBridge events"

  - source: "books-api"
    target: "aws-microservices"
    type: "sync"
    description: "Books API queries product microservice for catalog data via REST"
