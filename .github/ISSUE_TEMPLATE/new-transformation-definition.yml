name: Propose New Transformation Definition
description: Propose a new transformation definition for a different assessment type or domain
title: "[New TD] "
labels: ["enhancement", "new-transformation-definition"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What does this transformation definition assess? What problem does it solve?
    validations:
      required: true

  - type: dropdown
    id: td-type
    attributes:
      label: Assessment type
      options:
        - "Individual repository assessment"
        - "Portfolio/aggregation assessment"
        - "Both (individual + portfolio pair)"
    validations:
      required: true

  - type: textarea
    id: categories-criteria
    attributes:
      label: Proposed categories and criteria
      description: |
        Outline the assessment categories and key criteria. Use the existing format as reference:
        - Category name (N criteria)
          - Criterion ID: Description
      placeholder: |
        - Cost Efficiency (8 criteria)
          - COST-Q1: Right-sizing — Are compute resources matched to workload requirements?
          - COST-Q2: Reserved capacity — Are long-running workloads using reserved pricing?
    validations:
      required: true

  - type: textarea
    id: scoring
    attributes:
      label: Scoring approach
      description: How should criteria be scored? Use the existing 1–4 scale or propose an alternative with justification.
      placeholder: "Using the standard 1–4 scale (Not Present / Needs Work / Partial / Agent-Ready)"
    validations:
      required: true

  - type: textarea
    id: goals-pathways
    attributes:
      label: Goals and pathways (if applicable)
      description: Does this TD support goal-driven assessment? List any predefined goals and modernization pathways.
    validations:
      required: false

  - type: textarea
    id: integration
    attributes:
      label: Integration with existing TDs
      description: How does this relate to the existing individual/portfolio TDs? Can it be used standalone or does it complement them?
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution intent
      options:
        - label: I plan to submit a PR with the full transformation definition
          required: false
        - label: I have a draft transformation_definition.md ready for review
          required: false
        - label: I am proposing the idea and looking for collaborators
          required: false
