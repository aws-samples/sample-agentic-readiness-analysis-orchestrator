name: Improve Existing Transformation Definition
description: Suggest improvements to an existing transformation definition (criteria, scoring, pathways, report format)
title: "[TD Improvement] "
labels: ["enhancement", "transformation-definition"]
body:
  - type: dropdown
    id: target-td
    attributes:
      label: Which transformation definition?
      options:
        - "Individual Analysis (individual-aws-agentic-analysis)"
        - "Portfolio Analysis (portfolio-agentic-analysis)"
    validations:
      required: true

  - type: dropdown
    id: change-type
    attributes:
      label: Type of improvement
      options:
        - "Modify existing criterion (scoring, wording, evidence)"
        - "Add new criterion to existing category"
        - "Remove or merge criteria"
        - "Pathway logic (thresholds, conditions, alignment)"
        - "Report format or sections"
        - "Goal weighting or classification"
        - "Other"
    validations:
      required: true

  - type: input
    id: affected-criteria
    attributes:
      label: Affected criteria or section
      description: "e.g., INF-Q5, APP-Q13, Step 7 pathway logic, Portfolio Step 4 tiering"
      placeholder: "INF-Q5, APP-Q2"
    validations:
      required: false

  - type: textarea
    id: current-behavior
    attributes:
      label: Current behavior
      description: What does the TD currently do that you want to change?
    validations:
      required: true

  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed change
      description: What should it do instead? Include specific wording, scoring logic, or evidence patterns if applicable.
    validations:
      required: true

  - type: textarea
    id: justification
    attributes:
      label: Justification
      description: Why is this change needed? Include examples of repos where the current behavior produces inaccurate results.
    validations:
      required: true

  - type: dropdown
    id: goal-impact
    attributes:
      label: Does this change affect goal-driven behavior?
      options:
        - "No — applies regardless of goal"
        - "Yes — affects specific goal(s)"
      default: 0
    validations:
      required: true

  - type: checkboxes
    id: tested
    attributes:
      label: Testing
      options:
        - label: I have tested this change against at least one repository
          required: false
        - label: I can provide before/after report excerpts
          required: false
