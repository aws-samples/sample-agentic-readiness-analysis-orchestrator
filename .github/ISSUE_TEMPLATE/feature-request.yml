name: Feature Request
description: Suggest an improvement to the orchestrator or documentation
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see improved or added?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "Orchestrator workflow"
        - "Portfolio config options"
        - "Report examples"
        - "Documentation"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? How would you use it?
    validations:
      required: true
