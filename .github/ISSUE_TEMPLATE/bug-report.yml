name: Bug Report
description: Report an issue with the orchestrator, example reports, or documentation
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "Orchestrator (POWER.md / steering files)"
        - "Example reports"
        - "Portfolio config schema"
        - "Documentation (README)"
        - "Other"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: "ATX CLI version, OS, Kiro version (if applicable)"
    validations:
      required: false
