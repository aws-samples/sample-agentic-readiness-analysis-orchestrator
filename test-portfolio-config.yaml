portfolio_name: "ecommerce-platform-test"
goal: "agentic-ai-enablement"
goal_context: "Building customer-facing AI agents for support and order management"

# Transformation definition names as published in your AWS Transform registry
transformation_definitions:
  individual_assessment: "agentic-readiness-assessment"
  portfolio_assessment: "portfolio-agentic-readiness-assessment"

# Global preferences — flat prefer/avoid arrays replace all V1 nested constraint objects
preferences:
  prefer: ["dynamodb", "api-gateway", "eventbridge", "sqs", "eks"]

repositories:
  # Monolith - Unishop application (before decomposition)
  - name: "unishop-monolith"
    path: "./services/unishop-monolith-to-microservices/MonoToMicroLegacy"
    priority: "P0"
    repository_url: "https://github.com/aws-samples/unishop-monolith-to-microservices.git"
    context: "Legacy monolithic e-commerce application targeted for decomposition into microservices"
    preferences:
      prefer: ["containers"]
      avoid: ["lambda", "serverless"]

  # Microservices Repository - Event-driven serverless microservices
  - name: "aws-microservices"
    path: "./services/aws-microservices"
    priority: "P0"
    repository_url: "https://github.com/awsrun/aws-microservices.git"
    tags: ["microservices", "serverless", "event-driven"]
    context: "Event-driven microservices (product, basket, ordering) with Lambda, DynamoDB, EventBridge, SQS"
    preferences:
      prefer: ["lambda", "dynamodb", "eventbridge", "sqs", "event-driven", "saga", "async-messaging"]

  # Local Monolith - PHP application for containerized modernization
  - name: "local-monolith"
    path: "./monolith"
    priority: "P0"
    tags: ["monolith", "php", "containers", "eks"]
    context: "Local PHP monolith application targeting ECS-based containerized deployment with aggressive modernization"
    preferences:
      prefer: ["ecs", "ecr", "alb", "rds", "container-orchestration", "microservices"]
      avoid: ["lambda", "serverless"]

  # Microservice 6 - Books API (CDK-based serverless API)
  - name: "books-api"
    path: "./services/books-api"
    priority: "P1"
    repository_url: "https://github.com/aws-samples/aws-serverless-books-api-sample.git"
    tags: ["serverless", "cdk", "api", "dynamodb"]
    context: "Serverless REST API with CDK infrastructure for book catalog management"
    preferences:
      prefer: ["lambda", "dynamodb", "api-gateway", "cdk", "rest-api", "iac", "serverless"]

# Dependency overrides — only actual dependencies (removed "none" type entries as they are not valid in V2 schema)
dependency_overrides:
  - source: "aws-microservices"
    target: "books-api"
    type: "async"
    description: "Microservices ordering flow triggers book catalog updates via EventBridge events"

  - source: "books-api"
    target: "aws-microservices"
    type: "sync"
    description: "Books API queries product microservice for catalog data via REST"
