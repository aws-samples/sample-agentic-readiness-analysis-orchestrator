# Demo Portfolio Config: Open Source BPMN Repositories
#
# Pre-populated with public repos from official vendor organizations
# containing real BPMN process models.
#
# Change analysis_type to run different analysis combinations:
#   bpmn-opportunity  -> BAO only
#   full              -> ARA + MOD + BAO (requires all TDs published)
#
# Sources: Camunda (official), Camunda Community Hub (official),
# OMG BPMN MIWG (standards body)

portfolio_name: "bao-demo"
analysis_type: "full"
context: "Demonstrating BPMN agentic opportunity analysis across official open source process repositories covering invoice processing, order management, and BPMN interchange test cases."
agent_scope: "read-only"

transformation_definitions:
  agentic_readiness: "agentic-readiness-analysis"
  modernization: "modernization-analysis"
  bpmn_opportunity: "bpmn-opportunity-analysis"
  portfolio_agentic_readiness: "portfolio-agentic-readiness"
  portfolio_modernization: "portfolio-modernization"
  portfolio_bpmn_opportunity: "portfolio-bpmn-opportunity"
  portfolio_bridge: "portfolio-bridge"

repositories:
  # Camunda (official) -- Invoice Receipt
  # camunda:class, dataStoreReference, callActivity, businessRuleTask, userTasks
  # License: Apache 2.0
  - name: "camunda-invoice"
    repository_url: "https://github.com/camunda/camunda-bpm-platform.git"
    path: "./examples/reports/bao-demo/repos/camunda-invoice"
    priority: "P0"
    context: "Camunda 7 invoice receipt process with Java delegate service tasks, DMN business rules, data store references, and call activities."
    tags: ["camunda-c7", "finance", "invoice"]

  # Camunda Community Hub (official) -- Camunda 8 Order Processing
  # zeebe:taskDefinition, error boundary events, timer escalation, event subprocesses
  # License: Community
  - name: "camunda8-order-process"
    repository_url: "https://github.com/camunda-community-hub/Camunda-8-Project-Example.git"
    path: "./examples/reports/bao-demo/repos/camunda8-order-process"
    priority: "P0"
    context: "Camunda 8 order processing with Zeebe job workers, BPMN error events, timer escalation patterns, and event subprocesses."
    tags: ["camunda-c8", "orders", "zeebe"]

  # Camunda Community Hub (official) -- REST Service Integration
  # HTTP connector patterns, Java delegates for REST calls
  # License: Community
  - name: "camunda-rest-service"
    repository_url: "https://github.com/camunda-community-hub/Make-Rest-Calls-From-Camunda-7-Example.git"
    path: "./examples/reports/bao-demo/repos/camunda-rest-service"
    priority: "P1"
    context: "REST API integration patterns from Camunda 7 BPMN processes including HTTP connectors and Java delegates."
    tags: ["camunda-c7", "rest-api", "integration"]

  # OMG BPMN MIWG (standards body) -- Interchange Test Suite
  # Official BPMN 2.0 test cases, multiple vendor exports
  # License: CC-BY 3.0
  - name: "bpmn-miwg-test-suite"
    repository_url: "https://github.com/bpmn-miwg/bpmn-miwg-test-suite.git"
    path: "./examples/reports/bao-demo/repos/bpmn-miwg-test-suite"
    priority: "P1"
    context: "OMG official BPMN 2.0 Model Interchange test cases with reference models exported from multiple vendor tools."
    tags: ["standard-bpmn", "multi-vendor", "omg-official"]

  # Camunda (official) -- BPMN Examples Collection
  # Service tasks, external tasks, multi-tenancy, Spring Boot integration
  # License: Apache 2.0
  - name: "camunda-bpm-examples"
    repository_url: "https://github.com/camunda/camunda-bpm-examples.git"
    path: "./examples/reports/bao-demo/repos/camunda-bpm-examples"
    priority: "P1"
    context: "Official Camunda Platform 7 usage examples covering service tasks, external tasks, multi-tenancy, and Spring Boot integration patterns."
    tags: ["camunda-c7", "examples", "multi-pattern"]
