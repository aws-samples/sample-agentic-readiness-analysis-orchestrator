  <div class="section"><div class="grid grid-12">
    <div class="card span-4"><div class="card-title">🎯 Profile Distribution</div><div style="position:relative;height:260px"><canvas id="c-prof"></canvas></div></div>
    <div class="card span-4"><div class="card-title">📊 Severity by Service</div><div style="position:relative;height:260px"><canvas id="c-sev"></canvas></div></div>
    <div class="card span-4"><div class="card-title">🔥 Section Heatmap</div><div style="position:relative;height:260px"><canvas id="c-heat"></canvas></div></div>
  </div></div>
  <!-- 4. Service-by-Service Summary -->
  <div class="section"><div class="section-title"><span>🔍</span> Service-by-Service Summary</div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Service</th><th>Archetype</th><th>Profile</th><th>BLOCKERs</th><th>RISKs</th><th>INFOs</th><th>Priority</th></tr></thead>
    <tbody>${d.services.map(s=>`<tr><td style="font-weight:600">${s.id}</td><td>${s.arch}</td><td>${p(s.pc,s.profile)}</td><td class="${s.b>=3?'score-red':s.b>=1?'score-orange':''}">${s.b}</td><td class="${s.r>=20?'score-orange':s.r>=10?'score-yellow':''}">${s.r}</td><td>${s.i}</td><td>${p(s.prc,s.pri)}</td></tr>`).join('')}</tbody>
  </table></div></div></div>
  <!-- 5. Cross-Cutting BLOCKERs -->
  <div class="section"><div class="section-title"><span>🚨</span> Cross-Cutting BLOCKERs</div>
  ${d.ccBlockerList.length?'<div class="grid grid-2">'+d.ccBlockerList.map(b=>`<div class="card" style="border-left:3px solid var(--red)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:700">${b.id}: ${b.title}</span>${p('pill-red',b.repos+' repos')}</div><div style="font-size:.82rem;color:var(--muted)">${b.desc}</div></div>`).join('')+'</div>':'<div class="card" style="border-left:3px solid var(--green)"><div style="font-weight:600;color:var(--green)">✅ None identified</div><div style="font-size:.82rem;color:var(--muted);margin-top:4px">No BLOCKER appears in 2+ repos.</div></div>'}
  </div>
  <!-- 6. Cross-Cutting RISKs -->
  <div class="section"><div class="section-title"><span>⚠️</span> Cross-Cutting RISKs (${d.ccRisks})</div>
  ${Object.entries(risksByCat).map(([cat,items])=>`<details><summary>${cat} <span style="color:var(--muted);font-weight:400;font-size:.8rem">(${items.length} risks)</span></summary><div class="detail-body">${items.map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)"><span><strong>${r.id}</strong>: ${r.title}</span><span>${p('pill-orange',r.repos+' repos')}</span></div><div style="font-size:.78rem;color:var(--muted);padding:2px 0 8px">${r.desc}</div>`).join('')}</div></details>`).join('')}
  </div>
  <!-- 7. Remediation Priority -->
  <div class="section"><div class="section-title"><span>🎯</span> Remediation Priority</div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>#</th><th>Group</th><th>Services</th><th>Effort</th><th>Rationale</th></tr></thead>
    <tbody>${d.remPriority.map(r=>`<tr><td style="font-weight:700">${r.order}</td><td style="font-weight:600">${r.group}</td><td>${r.services}</td><td>${p('pill-blue',r.effort)}</td><td style="font-size:.82rem;color:var(--muted)">${r.rationale}</td></tr>`).join('')}</tbody>
  </table></div></div></div>
  <!-- 8. Pilot Candidate Ranking -->
  ${hasPilot?`<div class="section"><div class="section-title"><span>🏆</span> Pilot Candidate Ranking</div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Rank</th><th>Service</th><th>RISKs</th><th>Relevance</th></tr></thead>
    <tbody>${d.pilotCandidates.map(c=>`<tr><td style="font-weight:700">${c.rank}</td><td style="font-weight:600">${c.service}</td><td>${c.risks}</td><td style="font-size:.82rem;color:var(--muted)">${c.relevance}</td></tr>`).join('')}</tbody>
  </table></div></div></div>`:''}
  <!-- 9. Archetype Distribution -->
  <div class="section"><div class="section-title"><span>🧩</span> Archetype Distribution</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">${ARCHETYPES.map(a=>`<div class="card" style="padding:12px 18px;text-align:center"><div style="font-size:1.4rem;font-weight:700;color:var(--accent2)">${a.count}</div><div style="font-size:.78rem;color:var(--muted)">${a.name}</div></div>`).join('')}</div></div>
  <!-- 10. Dependency Map -->
  <div class="section"><div class="section-title"><span>🔗</span> Dependency Map</div>
  <div class="card"><div class="table-wrap"><table>
    <thead><tr><th>Service</th><th>Fan-In</th><th>Fan-Out</th><th>Role</th><th>Profile</th></tr></thead>
    <tbody>${DEPS.map(dep=>{const s=d.services.find(x=>x.id===dep.svc);return `<tr><td style="font-weight:600">${dep.svc}</td><td>${dep.fi}</td><td>${dep.fo}</td><td>${dep.role}</td><td>${s?p(s.pc,s.profile):''}</td></tr>`;}).join('')}</tbody>
  </table></div></div></div>
  <!-- 11. Agentic Program Recommendations -->
  <div class="section"><div class="section-title"><span>🚀</span> Agentic Program Recommendations</div>
  <div class="grid grid-3">
    <div class="card" style="border-top:3px solid ${d.programs.agentStorming?'var(--green)':'var(--border)'}"><div style="font-weight:700;margin-bottom:4px">AgentStorming</div><div style="font-size:.82rem;color:var(--muted);margin-bottom:8px">Collaborative agent design workshop</div>${d.programs.agentStorming?p('pill-green','TRIGGERED'):p('pill-muted','Not Triggered')}</div>
    <div class="card" style="border-top:3px solid ${d.programs.axe?'var(--green)':'var(--border)'}"><div style="font-weight:700;margin-bottom:4px">AXE</div><div style="font-size:.82rem;color:var(--muted);margin-bottom:8px">Triggered when 3+ services are Pilot-Ready or Agent-Ready</div>${d.programs.axe?p('pill-green','TRIGGERED — '+d.programs.axeReason):p('pill-muted','Not Triggered')}</div>
    <div class="card" style="border-top:3px solid ${d.programs.eba?'var(--green)':'var(--border)'}"><div style="font-weight:700;margin-bottom:4px">EBA on Agentic AI</div><div style="font-size:.82rem;color:var(--muted);margin-bottom:8px">Triggered when cross-cutting BLOCKERs affect 5+ repos</div>${d.programs.eba?p('pill-green','TRIGGERED — '+d.programs.ebaReason):p('pill-muted','Not Triggered')}</div>
  </div></div>
  <!-- 12. Portfolio-Level Findings -->
  <div class="section"><div class="section-title"><span>📑</span> Portfolio-Level Findings</div>
  <div class="grid grid-3">${d.portfolioFindings.map(f=>`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:700;font-size:.85rem">${f.id}</span>${p(f.sc,f.sev)}</div><div style="font-weight:600;font-size:.85rem;margin-bottom:4px">${f.title}</div><div style="font-size:.78rem;color:var(--muted)">${f.desc}</div></div>`).join('')}</div></div>
  <!-- 13. Readiness Snapshot -->
  <div class="section"><div class="section-title"><span>📋</span> Readiness Snapshot</div>
  <div class="card" style="font-family:'SF Mono',Consolas,monospace;font-size:.78rem;color:#a5b4fc;background:#181b24;line-height:1.8;padding:16px;white-space:pre">${d.snapshot}</div></div>`;

  /* Charts */
  charts['prof']=new Chart(document.getElementById('c-prof'),{type:'doughnut',data:{labels:['Agent-Ready','Pilot-Ready','Remediation Req.','Not Integrable'],datasets:[{data:[d.agentReady,d.pilotReady,d.remReq,d.notInt],backgroundColor:['#22c55e','#eab308','#f97316','#ef4444'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:'#8b8fa3',font:{size:10},padding:10}}}}});
  charts['sev']=new Chart(document.getElementById('c-sev'),{type:'bar',data:{labels:d.services.map(s=>s.id.replace('service','')),datasets:[{label:'BLOCKERs',data:d.services.map(s=>s.b),backgroundColor:'#ef4444'},{label:'RISKs',data:d.services.map(s=>s.r),backgroundColor:'#f97316'},{label:'INFOs',data:d.services.map(s=>s.i),backgroundColor:'#6366f1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa3',font:{size:10}}}},scales:{x:{stacked:true,ticks:{color:'#8b8fa3',font:{size:7},maxRotation:45},grid:{display:false}},y:{stacked:true,ticks:{color:'#8b8fa3'},grid:{color:'#2d3148'}}}}});
  charts['heat']=new Chart(document.getElementById('c-heat'),{type:'bar',data:{labels:d.heatmap.map(h=>h.sec),datasets:[{label:'BLOCKERs',data:d.heatmap.map(h=>h.b),backgroundColor:'#ef4444'},{label:'RISKs',data:d.heatmap.map(h=>h.r),backgroundColor:'#f97316'}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa3',font:{size:10}}}},scales:{x:{stacked:true,ticks:{color:'#8b8fa3'},grid:{color:'#2d3148'}},y:{stacked:true,ticks:{color:'#8b8fa3',font:{size:11}},grid:{display:false}}}}});
  if(document.getElementById('deltaToggle').checked)renderDelta();
}

/* ── DELTA ── */
function toggleDelta(){
  const on=document.getElementById('deltaToggle').checked;
  document.getElementById('delta-section').style.display=on?'block':'none';
  document.getElementById('compareSelect').style.display=on?'inline-block':'none';
  if(on)renderDelta();
}
function renderDelta(){
  if(charts['dbar']){charts['dbar'].destroy();delete charts['dbar'];}
  const a=RUNS[rs.value],b=RUNS[cs.value],el=document.getElementById('delta-section');
  const metrics=[{l:'Total BLOCKERs',a:a.blockers,b:b.blockers},{l:'Total RISKs',a:a.risks,b:b.risks},{l:'Pilot-Ready',a:a.pilotReady,b:b.pilotReady},{l:'Cross-Cutting BLOCKERs',a:a.ccBlockers,b:b.ccBlockers},{l:'Not Integrable',a:a.notInt,b:b.notInt}];
  el.innerHTML=`<div class="section"><div class="section-title"><span>📊</span> Compare Runs — ${a.label.split('—')[1]?.trim()||'Run '+a.id} vs ${b.label.split('—')[1]?.trim()||'Run '+b.id}</div>
  <div class="grid grid-2">
    <div class="card"><div class="card-title">Key Metrics Delta</div><table>${metrics.map(m=>{const d2=m.b-m.a;return`<tr><td style="font-weight:600">${m.l}</td><td>${m.a}</td><td>→</td><td>${m.b}</td><td class="${dc(d2)}" style="font-weight:700">${df(d2)}</td></tr>`;}).join('')}</table></div>
    <div class="card"><div class="card-title">BLOCKER Reduction per Service</div><div style="position:relative;height:260px"><canvas id="c-delta"></canvas></div></div>
  </div>
  <div class="card" style="margin-top:20px"><div class="card-title">Service-by-Service Comparison</div><div class="table-wrap"><table>
    <thead><tr><th>Service</th><th>B (Run ${a.id})</th><th>B (Run ${b.id})</th><th>Δ B</th><th>R (Run ${a.id})</th><th>R (Run ${b.id})</th><th>Δ R</th><th>Profile Change</th></tr></thead>
    <tbody>${a.services.map((sa,i)=>{const sb=b.services[i];const db=sb.b-sa.b,dr=sb.r-sa.r;const pc=sa.profile===sb.profile?p('pill-muted',sb.profile):p(sa.pc,sa.profile)+' → '+p(sb.pc,sb.profile);return`<tr><td style="font-weight:600">${sa.id}</td><td>${sa.b}</td><td>${sb.b}</td><td class="${dc(db)}" style="font-weight:700">${df(db)}</td><td>${sa.r}</td><td>${sb.r}</td><td class="${dc(dr)}" style="font-weight:700">${df(dr)}</td><td>${pc}</td></tr>`;}).join('')}</tbody>
  </table></div></div></div>`;
  charts['dbar']=new Chart(document.getElementById('c-delta'),{type:'bar',data:{labels:a.services.map(s=>s.id.replace('service','')),datasets:[{label:'Run '+a.id,data:a.services.map(s=>s.b),backgroundColor:'rgba(239,68,68,.4)',borderColor:'#ef4444',borderWidth:1},{label:'Run '+b.id,data:b.services.map(s=>s.b),backgroundColor:'rgba(34,197,94,.4)',borderColor:'#22c55e',borderWidth:1}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b8fa3',font:{size:10}}}},scales:{x:{ticks:{color:'#8b8fa3',font:{size:7},maxRotation:45},grid:{display:false}},y:{ticks:{color:'#8b8fa3'},grid:{color:'#2d3148'}}}}});
}

/* ── BOOT ── */
render();
</script>
</body>
</html>
