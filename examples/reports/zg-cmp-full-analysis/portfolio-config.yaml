#   - repo_type / service_archetype to override auto-detection
#   - preferences block to match your target stack
# ============================================================================

portfolio_name: "zg-cmp-atx-testing"
analysis_type: "full"

context: "Portfolio of 34 open-source project mirrors used to validate ATX custom transformation definitions across a broad mix of languages (Java, Python, JavaScript/TypeScript, C#), architectures (monolith, microservices, serverless, CLI, frontend, data platform), and domains (observability, storage, IoT, AI/LLM, analytics, healthcare)."

agent_scope: "read-only"

transformation_definitions:
  agentic_readiness: "agentic-readiness-analysis"
  modernization: "modernization-readiness-analysis"
  portfolio_agentic_readiness: "portfolio-agentic-readiness"
  portfolio_modernization: "portfolio-modernization"
  portfolio_bridge: "portfolio-agentic-modernization-bridge"

preferences:
  prefer:
    - "eks"
    - "aurora"
    - "dynamodb"
    - "api-gateway"
    - "eventbridge"
    - "bedrock"
  avoid:
    - "self-managed-kafka"
    - "self-managed-kubernetes"
    - "oracle"

