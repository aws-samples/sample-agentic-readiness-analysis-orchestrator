# ATX configuration for the Portfolio Execution Plan TD.
#
# This file is in ATX's expected format (additionalPlanContext block).
# It is consumed directly by ATX via:
#   atx custom def exec -n portfolio-execution-plan-generation -p . -g file://atx-config-exec-plan.yaml -x -t
#
# In orchestrated mode, Kiro Power generates this file automatically from the
# `execution_plan` section of portfolio-config.yaml. For manual execution,
# create this file yourself with the parameters below.
#
# See: portfolio-config.schema.json for the orchestrator input schema
# See: orchestrator/steering/execution-plan.md for generation rules

additionalPlanContext: |
  portfolio_name: "ecommerce-platform-v2"
  team_size: 8
  timeline_constraint: "12 months"
  budget_constraint: "$1.2M including training and infrastructure"
  compliance_requirements: ["SOC2", "PCI-DSS"]
  availability_requirement: "99.95%"
  risk_tolerance: "moderate"
  existing_capabilities: "Strong Java/Spring, basic Docker, CI/CD with Jenkins, no Kubernetes experience"
  preferences:
    prefer: ["eks", "aurora", "bedrock"]
    avoid: ["self-managed-kafka", "oracle"]
