# =============================================================================
# Portfolio Assessment Configuration Example (V2 — Goal-Driven Format)
# =============================================================================
#
# This is the simplified V2 config format. Key changes from V1:
#   - New required `goal` field drives report framing, phase names, and priorities
#   - Flat `preferences.prefer` / `preferences.avoid` arrays replace ALL nested
#     constraint objects (database_constraints, deployment_constraints, etc.)
#   - Per-repo config simplified: `context` free-text replaces verbose nested objects
#   - Removed: description, version, assessment_date, global_transformation_preferences,
#     transformation_options, exclusions, metadata
#
# V2 is a BREAKING CHANGE from V1. Old configs require migration.
# =============================================================================

# --- Required Fields ---

portfolio_name: "ecommerce-platform"

# Goal acts as a priority lens — all 7 pathways are still evaluated, but the goal
# determines which are highlighted, how phases are named, and which criteria are
# prioritized in the Top 5 Critical Gaps.
#
# Valid values:
#   - agentic-ai-enablement       → Focus on enabling autonomous AI agents
#   - cloud-native-modernization  → Focus on containers, managed services, decomposition
#   - cost-optimization           → Focus on license elimination, managed services, right-sizing
#   - general-readiness           → Comprehensive assessment, no specific weighting
goal: "cloud-native-modernization"

# Optional free-text context that tailors recommendations to your specific situation.
# Influences Quick Agent Wins suggestions, recommendation framing, and service prioritization.
goal_context: "Modernizing legacy e-commerce platform to cloud-native architecture on AWS. Priority is containerizing critical-path services and eliminating Kubernetes self-management overhead by moving to ECS/Fargate."

# Transformation definitions — must match names published to your AWS Transform registry
transformation_definitions:
  individual_assessment: "individual-aws-agentic-assessment"
  portfolio_assessment: "portfolio-agentic-assessment"

# --- Global Preferences ---
# Flat prefer/avoid arrays replace ALL V1 nested constraint objects.
# The agent interprets these intelligently:
#   prefer: ["ecs", "fargate"] → recommend ECS/Fargate for compute
#   avoid: ["kubernetes"]      → don't recommend EKS or self-managed K8s
#
# Per-repo preferences merge with these globals. Per-repo `avoid` overrides
# global `prefer` when a value appears in both.
preferences:
  prefer:
    - "ecs"
    - "fargate"
    - "lambda"
    - "rest-api"
    - "openapi"
  avoid:
    - "kubernetes"
    - "k8s"
    - "helm"
    - "event-sourcing"
    - "cqrs"

# --- Repositories ---
# Minimum 2 required. Each repo gets an individual assessment report.
# Only `name` and `path` are required — everything else is optional.
repositories:

  # --- P0: Critical Services ---

  - name: "storefront-web"
    path: "./services/storefront-web"
    priority: "P0"
    tags: ["frontend", "customer-facing", "web"]
    # V1 had: avoid_microservices_decomposition, keep_as_monolith, custom_constraints
    # V2: use `context` for business constraints, `preferences.avoid` for tech constraints
    context: "Customer-facing storefront. Must maintain backward compatibility with mobile apps — no breaking changes to public API. Keep as monolith, focus on containerization."
    preferences:
      avoid:
        - "microservices-decomposition"

  - name: "checkout-service"
    path: "./services/checkout-service"
    priority: "P0"
    tags: ["backend", "payment", "critical-path"]
    # V1 had: avoid_technologies, deployment_constraints, compliance_requirements,
    #         timeline_constraints, custom_constraints
    # V2: compliance and timeline info goes in `context`, tech prefs in `preferences`
    context: "Payment processing service. PCI-DSS and SOC2 compliant. Must complete migration within 6 months. Prefer VM-based deployment over containers for this service."
    preferences:
      avoid:
        - "kubernetes"
        - "k8s"
        - "helm"
        - "containers"
        - "orchestration"

  - name: "user-service"
    path: "./services/user-service"
    priority: "P0"
    tags: ["backend", "auth", "user-management"]
    # Minimal config — no special preferences needed. Agent uses global preferences.

  # --- P1: High Priority Services ---

  - name: "inventory-service"
    path: "./services/inventory-service"
    priority: "P1"
    tags: ["backend", "data", "inventory"]
    # V1 had: database_constraints (avoid_migration, keep_current_database),
    #         budget_constraints, modernization_approach
    # V2: database constraints become preferences.avoid, budget info goes in context
    context: "Core inventory data service. Strict budget — keep current database engine, can use RDS but avoid full database migration."
    preferences:
      avoid:
        - "database-migration"

  - name: "product-catalog"
    path: "./services/product-catalog"
    priority: "P1"
    tags: ["backend", "data", "catalog"]
    # V1 had: prefer_technologies, prefer_patterns, avoid_patterns,
    #         modernization_approach, timeline_constraints
    # V2: all flattened into prefer/avoid arrays
    context: "Product catalog service. Aggressive modernization timeline is flexible."
    preferences:
      prefer:
        - "ecs"
        - "fargate"
        - "dynamodb"
        - "rest-api"
        - "openapi"
        - "caching"
      avoid:
        - "event-sourcing"
        - "cqrs"

  - name: "order-fulfillment"
    path: "./services/order-fulfillment"
    priority: "P1"
    tags: ["backend", "fulfillment", "logistics"]
    # Minimal config — uses global preferences only

  # --- P2: Medium Priority Services ---

  - name: "notification-service"
    path: "./services/notification-service"
    priority: "P2"
    tags: ["backend", "messaging", "notifications"]
    # V1 had: avoid_technologies (docker, containers), prefer_technologies (lambda, sqs, sns),
    #         deployment_constraints, prefer_patterns, budget_constraints
    # V2: all flattened into prefer/avoid
    context: "Event-driven notification service. Good candidate for serverless migration."
    preferences:
      prefer:
        - "lambda"
        - "sqs"
        - "sns"
        - "eventbridge"
        - "event-driven"
        - "serverless"
      avoid:
        - "containers"
        - "orchestration"

  - name: "analytics-pipeline"
    path: "./services/analytics-pipeline"
    priority: "P2"
    tags: ["data", "analytics", "ml"]
    # Minimal config — uses global preferences only

# --- Dependency Overrides ---
# Manual dependency declarations for cases where auto-detection fails.
# Structure unchanged from V1.
dependency_overrides:
  - source: "storefront-web"
    target: "product-catalog"
    type: "sync"
    description: "Storefront calls Product Catalog REST API for product listings"

  - source: "storefront-web"
    target: "user-service"
    type: "sync"
    description: "Storefront authenticates users via User Service"

  - source: "checkout-service"
    target: "inventory-service"
    type: "sync"
    description: "Checkout validates inventory availability before order placement"

  - source: "order-fulfillment"
    target: "notification-service"
    type: "async"
    description: "Fulfillment publishes order status events to notification queue"
