# ============================================================================
# V2 Portfolio Assessment Configuration
# ============================================================================
# This config uses the v2 two-assessment architecture:
#   - ARA (Agentic Readiness Assessment): 49 questions, BLOCKER/RISK/INFO
#   - MOD (Modernization Readiness Assessment): 37 questions, 1-4 scale
# ============================================================================

portfolio_name: "ecommerce-platform-v2"
assessment_type: "full"

context: "Evaluating the e-commerce platform portfolio for both autonomous AI agent integration and cloud-native modernization. The team is building a customer support agent that handles order inquiries, processes returns, and manages inventory restocking — while simultaneously modernizing legacy monoliths into containerized microservices on EKS."

agent_scope: "write-enabled"

transformation_definitions:
  agentic_readiness: "agentic-readiness-assessment"
  modernization: "modernization-assessment"
  portfolio_agentic_readiness: "portfolio-agentic-readiness"
  portfolio_modernization: "portfolio-modernization"

preferences:
  prefer:
    - "eks"
    - "aurora"
    - "dynamodb"
    - "api-gateway"
    - "eventbridge"
    - "bedrock"
    - "terraform"
    - "gitops"
  avoid:
    - "self-managed-kafka"
    - "self-managed-kubernetes"
    - "oracle"
    - "manual-deployments"

repositories:
  - name: "unishop-monolith"
    path: "./services/unishop-monolith-to-microservices/MonoToMicroLegacy"
    priority: "P0"
    repository_url: "https://github.com/aws-samples/unishop-monolith-to-microservices.git"
    context: "Legacy Java Spring Boot monolith on EC2 with MySQL — primary decomposition target. The agent needs access to order and return data through discrete service APIs."
    tags:
      - "monolith"
      - "java"
      - "ec2"
      - "decomposition-target"
    preferences:
      prefer:
        - "containers"
        - "aurora-mysql"
        - "microservices-decomposition"
      avoid:
        - "serverless"
        - "lambda"

  - name: "aws-microservices"
    path: "./services/aws-microservices"
    priority: "P0"
    repository_url: "https://github.com/awsrun/aws-microservices.git"
    context: "Event-driven serverless microservices (product, basket, ordering) with Lambda, DynamoDB, EventBridge, SQS. The agent will invoke these as tools for order status lookups and return processing."
    tags:
      - "microservices"
      - "serverless"
      - "event-driven"

  - name: "local-monolith"
    path: "./monolith"
    priority: "P0"
    context: "PHP monolith with Docker and CloudFormation on App Runner — containerize and expose inventory APIs the agent needs for restocking decisions."
    tags:
      - "monolith"
      - "php"
      - "containers"

  - name: "books-api"
    path: "./services/books-api"
    priority: "P1"
    repository_url: "https://github.com/aws-samples/aws-serverless-books-api-sample.git"
    context: "Serverless REST API with CDK infrastructure for book catalog management. Clean API surface the agent can use as a tool for product lookups."
    tags:
      - "serverless"
      - "cdk"
      - "api"
      - "dynamodb"

  - name: "eks-saas-gitops"
    path: "./services/eks-saas-gitops"
    priority: "P1"
    repository_url: "https://github.com/aws-solutions-library-samples/eks-saas-gitops"
    repo_type: "infrastructure-only"
    agent_scope: "read-only"
    context: "EKS SaaS GitOps monorepo with Terraform IaC, Karpenter, and multi-tenant infrastructure. Classified as infrastructure-only to test N/A mappings."
    tags:
      - "eks"
      - "gitops"
      - "terraform"
      - "saas"
      - "infrastructure"

dependency_overrides:
  - source: "aws-microservices"
    target: "books-api"
    type: "async"
    description: "Microservices ordering flow triggers book catalog updates via EventBridge events"

  - source: "books-api"
    target: "aws-microservices"
    type: "sync"
    description: "Books API queries product microservice for catalog data via REST"

  - source: "unishop-monolith"
    target: "eks-saas-gitops"
    type: "shared_infra"
    description: "Unishop will be deployed onto the EKS cluster managed by eks-saas-gitops"

  - source: "local-monolith"
    target: "eks-saas-gitops"
    type: "shared_infra"
    description: "Local monolith will be containerized and deployed onto the EKS cluster"

  - source: "aws-microservices"
    target: "local-monolith"
    type: "sync"
    description: "Microservices query monolith for legacy product data during migration"
