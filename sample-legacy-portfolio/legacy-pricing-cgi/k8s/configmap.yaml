apiVersion: v1
kind: ConfigMap
metadata:
  name: legacy-pricing-cgi-config
  namespace: legacy-pricing-cgi
  labels:
    app.kubernetes.io/name: legacy-pricing-cgi
    app.kubernetes.io/component: config
data:
  # Path to the pricing rules file inside the container
  PRICING_RULES_PATH: "/etc/pricing/rules.dat"
  # Apache server name
  SERVER_NAME: "localhost"
