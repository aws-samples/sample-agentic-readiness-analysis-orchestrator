apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-pricing-cgi
  namespace: legacy-pricing-cgi
  labels:
    app.kubernetes.io/name: legacy-pricing-cgi
    app.kubernetes.io/component: server
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: legacy-pricing-cgi
  template:
    metadata:
      labels:
        app.kubernetes.io/name: legacy-pricing-cgi
        app.kubernetes.io/component: server
    spec:
      containers:
        - name: legacy-pricing-cgi
          # Replace with your ECR image URI, e.g.:
          # <account-id>.dkr.ecr.<region>.amazonaws.com/legacy-pricing-cgi:latest
          image: legacy-pricing-cgi:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: legacy-pricing-cgi-config
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /cgi-bin/pricing.cgi?sku=HEALTH&qty=1
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /cgi-bin/pricing.cgi?sku=HEALTH&qty=1
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
