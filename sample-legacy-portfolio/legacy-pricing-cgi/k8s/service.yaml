apiVersion: v1
kind: Service
metadata:
  name: legacy-pricing-cgi
  namespace: legacy-pricing-cgi
  labels:
    app.kubernetes.io/name: legacy-pricing-cgi
    app.kubernetes.io/component: server
  # To expose via AWS ALB Ingress Controller, create an Ingress resource:
  #
  # apiVersion: networking.k8s.io/v1
  # kind: Ingress
  # metadata:
  #   name: legacy-pricing-cgi
  #   namespace: legacy-pricing-cgi
  #   annotations:
  #     kubernetes.io/ingress.class: alb
  #     alb.ingress.kubernetes.io/scheme: internet-facing
  #     alb.ingress.kubernetes.io/target-type: ip
  # spec:
  #   rules:
  #     - http:
  #         paths:
  #           - path: /cgi-bin/pricing.cgi
  #             pathType: Prefix
  #             backend:
  #               service:
  #                 name: legacy-pricing-cgi
  #                 port:
  #                   number: 8080
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: legacy-pricing-cgi
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
