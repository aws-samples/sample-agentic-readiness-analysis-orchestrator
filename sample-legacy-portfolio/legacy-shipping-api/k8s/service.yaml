apiVersion: v1
kind: Service
metadata:
  name: shipping-rate-api
  namespace: shipping-rate-api
  labels:
    app.kubernetes.io/name: shipping-rate-api
    app.kubernetes.io/part-of: shipping-rate-api
  # To expose via AWS ALB Ingress Controller, create an Ingress resource:
  # apiVersion: networking.k8s.io/v1
  # kind: Ingress
  # metadata:
  #   name: shipping-rate-api-ingress
