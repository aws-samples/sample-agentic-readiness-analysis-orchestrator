  #   annotations:
  #     kubernetes.io/ingress.class: alb
  #     alb.ingress.kubernetes.io/scheme: internal
  #     alb.ingress.kubernetes.io/target-type: ip
  # spec:
  #   rules:
  #     - http:
  #         paths:
  #           - path: /
  #             pathType: Prefix
  #             backend:
  #               service:
  #                 name: shipping-rate-api
  #                 port:
  #                   number: 8080
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: shipping-rate-api
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
