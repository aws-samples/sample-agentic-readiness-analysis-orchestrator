apiVersion: v1
kind: ConfigMap
metadata:
  name: shipping-rate-api-config
  namespace: shipping-rate-api
  labels:
    app.kubernetes.io/name: shipping-rate-api
    app.kubernetes.io/part-of: shipping-rate-api
data:
  # MongoDB connection URL - replace with your environment-specific value
  MONGO_URL: "mongodb://mongo-service:27017/shipping"
  # Application port
  PORT: "8080"
