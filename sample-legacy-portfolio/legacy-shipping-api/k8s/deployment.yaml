apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-rate-api
  namespace: shipping-rate-api
  labels:
    app.kubernetes.io/name: shipping-rate-api
    app.kubernetes.io/part-of: shipping-rate-api
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: shipping-rate-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shipping-rate-api
        app.kubernetes.io/part-of: shipping-rate-api
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: shipping-rate-api
          # Replace with your ECR image URI, e.g.:
          # <account-id>.dkr.ecr.<region>.amazonaws.com/shipping-rate-api:latest
          image: shipping-rate-api:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: shipping-rate-api-config
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: shipping-rate-api-secret
                  key: api-key
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
