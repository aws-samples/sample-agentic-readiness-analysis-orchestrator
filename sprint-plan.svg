      <text x="183" y="-5" font-size="10" fill="#64748b" text-anchor="middle">W2-4</text>
      <text x="458" y="-5" font-size="10" fill="#64748b" text-anchor="middle">W5-7</text>
      <text x="733" y="-5" font-size="10" fill="#64748b" text-anchor="middle">W8-10</text>
