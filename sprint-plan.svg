      <text x="0" y="32" font-size="10" fill="#666">2. OpenSearch + Bedrock Embeddings → Knowledge Base (RAG capability)</text>
      <text x="0" y="48" font-size="10" fill="#666">3. Knowledge Base → Agent Framework (Claude via Bedrock + LangChain4j)</text>
      <text x="0" y="64" font-size="10" fill="#666">4. Step Functions → HITL Approvals (governance for high-risk ops)</text>

      <text x="0" y="90" font-size="11" font-weight="bold" fill="#059669">🎯 Target State:</text>
      <text x="0" y="106" font-size="10" fill="#666">• Production RAG with semantic search (not SHA-256 hashes)</text>
      <text x="0" y="122" font-size="10" fill="#666">• Claude agents calling TODO APIs via LangChain4j orchestration</text>
