      <text x="500" y="-5" font-size="10" fill="#64748b" text-anchor="middle">Day 15</text>
      <text x="750" y="-5" font-size="10" fill="#64748b" text-anchor="middle">Day 22</text>
      <text x="1000" y="-5" font-size="10" fill="#64748b" text-anchor="middle">Day 30</text>
