    <!-- Task 2 -->
    <rect x="150" y="75" width="150" height="28" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2" rx="4"/>
    <text x="160" y="94" font-size="11" font-weight="600" fill="#065f46">Bedrock Embeddings (3-5d)</text>

    <!-- Task 3 -->
    <rect x="320" y="40" width="200" height="28" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2" rx="4"/>
    <text x="330" y="59" font-size="11" font-weight="600" fill="#065f46">Business Metrics (5-7d)</text>

    <!-- Task 4 -->
    <rect x="320" y="75" width="200" height="28" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="2" rx="4"/>
    <text x="330" y="94" font-size="11" font-weight="600" fill="#065f46">CloudWatch Anomaly Detection (5-7d)</text>

