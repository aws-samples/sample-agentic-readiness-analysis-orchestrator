    <text x="650" y="0" font-size="10" text-anchor="middle" fill="#9ca3af">
      Generated from Agentic Readiness Assessment | Overall Score: 1.8/4.0 → Target: 3.5/4.0
    </text>
    <text x="650" y="15" font-size="10" text-anchor="middle" fill="#9ca3af">
      🔥 Start with Phase 1 Quick Wins (no dependencies) | Then Dockerfile (blocks everything in Phase 2)
    </text>
