      <text x="0" y="32" font-size="10" fill="#666">• Bedrock Embeddings replaces non-functional SHA-256 hash "embeddings"</text>
      <text x="0" y="48" font-size="10" fill="#666">• All tasks can run in parallel - no dependencies</text>
