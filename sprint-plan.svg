      <text x="0" y="48" font-size="10" fill="#666">3. Managed databases can run parallel to ECS (Weeks 5-7)</text>
      <text x="0" y="64" font-size="10" fill="#666">4. Tests, SQS, Resilience4j independent - start anytime</text>

