      <text x="0" y="34" font-size="10" fill="#4b5563">• Phase 2 (Foundation): 12 weeks | Critical path: Dockerfile → ECS/CI/CD</text>
      <text x="0" y="50" font-size="10" fill="#4b5563">• Phase 3 (Agent Enablement): 12 weeks | Critical path: SQS → Step Functions → KB → Agent</text>
      <text x="0" y="66" font-size="10" fill="#4b5563">• Total Wall Time: ~6 months with parallel work</text>
    </g>

    <g transform="translate(550, 45)">
