      <text x="0" y="18" font-size="10" fill="#dc2626">🔴 Dockerfile (Phase 2, Week 1) blocks ECS + CI/CD</text>
      <text x="0" y="34" font-size="10" fill="#dc2626">🔴 SQS (Phase 2) blocks Step Functions (Phase 3)</text>
      <text x="0" y="50" font-size="10" fill="#dc2626">🔴 OpenSearch + Bedrock blocks Knowledge Base</text>
      <text x="0" y="66" font-size="10" fill="#dc2626">🔴 Knowledge Base blocks Agent Framework</text>
    </g>

    <g transform="translate(1050, 45)">
      <text x="0" y="0" font-size="11" font-weight="bold" fill="#1f2937">Quick Wins:</text>
      <text x="0" y="18" font-size="10" fill="#059669">✓ Secrets Manager (3-5d)</text>
      <text x="0" y="34" font-size="10" fill="#059669">✓ Bedrock Embeddings (3-5d)</text>
      <text x="0" y="50" font-size="10" fill="#059669">✓ Business Metrics (5-7d)</text>
      <text x="0" y="66" font-size="10" fill="#6b7280">All run in parallel</text>
    </g>
  </g>

  <!-- Footer -->
